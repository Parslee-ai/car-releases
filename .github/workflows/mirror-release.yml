name: Mirror release from Parslee-ai/car

# MANUAL FALLBACK ONLY.
#
# The primary, automated mirror lives in the private repo:
#   Parslee-ai/car -> .github/workflows/build.yml -> job `mirror-to-car-releases`
# That job runs on every `v*` tag push and copies every asset into this repo's
# GitHub Releases automatically. 99% of the time you do not need this workflow.
#
# Use this manual workflow when:
#   - Backfilling a tag that predates the auto-mirror job (e.g. v0.4.1-v0.4.3).
#   - Re-mirroring a tag after the auto-mirror job failed (expired PAT,
#     network flake, partial upload). Re-running here is safe — `gh release
#     create` will refuse to clobber, so delete the broken release first or
#     swap to `gh release upload --clobber` manually.
#   - Ad-hoc cleanup / asset replacement for an already-published tag.
#
# Requires a repo secret MIRROR_TOKEN — a PAT with `repo` scope on the
# private Parslee-ai/car repository.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to mirror (e.g. v0.3.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download assets from private repo
        env:
          GH_TOKEN: ${{ secrets.MIRROR_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          mkdir -p artifacts
          cd artifacts
          gh release download "$TAG" --repo Parslee-ai/car --pattern '*'
          ls -lh

      - name: Read release notes
        env:
          GH_TOKEN: ${{ secrets.MIRROR_TOKEN }}
          TAG: ${{ inputs.tag }}
        id: notes
        run: |
          body=$(gh release view "$TAG" --repo Parslee-ai/car --json body --jq .body)
          # Write to file to preserve multiline — feeds the next step via file ref.
          printf '%s\n' "$body" > release-notes.md
          echo "notes-file=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Publish public release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          # Create or reuse the tag on this public repo, pointing at current HEAD.
          # Users install from this repo's releases, so the tag's commit is
          # cosmetic — the real source-of-truth tag lives on Parslee-ai/car.
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            --verify-tag \
            artifacts/*
