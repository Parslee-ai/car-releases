ShortDescription: Deterministic execution layer for AI agents (CLI + server).
Description: |-
  Common Agent Runtime (CAR) — models propose, the runtime validates,
  verifies, and executes. Pre-built CLI (car), WebSocket server
  (car-server), and evaluation bridge (car-memgine-eval) for Windows x64.
  v0.13.0 fans out cross-session approval resolution to the owning
  session (third-party approval UIs no longer error) and auto-publishes
  the Sparkle appcast during release so the macOS Host.app self-updates.
