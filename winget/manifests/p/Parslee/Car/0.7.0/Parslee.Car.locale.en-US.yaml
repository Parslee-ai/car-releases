ShortDescription: Deterministic execution layer for AI agents (CLI + server).
Description: |-
  Common Agent Runtime (CAR) — models propose, the runtime validates,
  verifies, and executes. Pre-built CLI (car), WebSocket server
  (car-server), and evaluation bridge (car-memgine-eval) for Windows x64.
  v0.7.0 ships voice-sidecar dispatch (two-track conversation pattern
  for sub-500-ms first audio), per-session policy scoping, host-registered
  inference runners for delegated wire formats (Anthropic / OpenAI /
  Vercel AI SDK), ElevenLabs Realtime STT streaming, and Yume MLX video.
